<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Website Vision — ConversionCo</title>
<style>html,body{margin:0;padding:0;background:#0C1A30;-webkit-text-size-adjust:100%}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
button{cursor:pointer;font-family:inherit}</style>
</head>
<body>
<div id="cco-form-root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel" data-presets="react">
// Shared multi-step engine (injected into both forms)
const { useState } = React;
function Engine({ title, subtitle, steps, submitUrl, extra, accent }) {
  const [i, setI] = useState(0);
  const [a, setA] = useState(() => {
    const init = {};
    const p = new URLSearchParams(window.location.search);
    if (p.get('e')) init['Email'] = p.get('e');
    return init;
  });
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);
  const [err, setErr] = useState('');
  const s = steps[i];
  const set = (k, v) => setA((o) => ({ ...o, [k]: v }));
  const valid = () => !s.fields.some((f) => f.req && !(a[f.k] && String(a[f.k]).trim()));
  const next = async () => {
    if (!valid()) { setErr('Please fill in the required field(s).'); return; }
    setErr('');
    if (i < steps.length - 1) { setI(i + 1); window.scrollTo(0, 0); return; }
    setBusy(true);
    try {
      const payload = { ...extra, ...a };
      await fetch(submitUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      setDone(true);
    } catch (e) { setErr('Something went wrong — please try again.'); }
    setBusy(false);
  };
  const F = {
    text: (f) => <input key={f.k} style={ST.in} placeholder={f.ph || ''} value={a[f.k] || ''} onChange={(e) => set(f.k, e.target.value)} inputMode={f.mode} />,
    area: (f) => <textarea key={f.k} style={{ ...ST.in, minHeight: 96, resize: 'vertical' }} placeholder={f.ph || ''} value={a[f.k] || ''} onChange={(e) => set(f.k, e.target.value)} />,
    select: (f) => (
      <div key={f.k} style={ST.optWrap}>{f.opts.map((o) => (
        <button key={o} style={{ ...ST.opt, ...(a[f.k] === o ? ST.optOn : {}) }} onClick={() => set(f.k, o)}>{o}</button>))}
      </div>),
    chips: (f) => (
      <div key={f.k} style={ST.optWrap}>{f.opts.map((o) => {
        const cur = (a[f.k] || '').split(' | ').filter(Boolean);
        const on = cur.includes(o);
        return <button key={o} style={{ ...ST.chip, ...(on ? ST.optOn : {}) }} onClick={() => set(f.k, (on ? cur.filter((x) => x !== o) : [...cur, o]).join(' | '))}>{on ? '✓ ' : ''}{o}</button>;
      })}</div>),
    rows: (f) => {
      let rows = [];
      try { rows = JSON.parse(a[f.k + ' JSON'] || '[]'); } catch {}
      if (!rows.length) rows = [{}];
      const save = (r) => {
        set(f.k + ' JSON', JSON.stringify(r));
        set(f.k, r.filter((x) => x[f.cols[0].k]).map((x) => f.cols.map((c) => (c.pre || '') + (x[c.k] || '')).filter((v) => v && v !== '$').join(' — ')).join('\n'));
      };
      return (
        <div key={f.k}>
          {rows.map((r, ri) => (
            <div key={ri} style={{ display: 'flex', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
              {f.cols.map((c) => (
                <input key={c.k} style={{ ...ST.in, flex: c.flex || 1, minWidth: c.w || 90, marginBottom: 0 }} placeholder={c.ph}
                  value={r[c.k] || ''} inputMode={c.mode}
                  onChange={(e) => { const n = rows.map((x, xi) => xi === ri ? { ...x, [c.k]: e.target.value } : x); save(n); }} />))}
              {rows.length > 1 && <button style={ST.x} onClick={() => save(rows.filter((_, xi) => xi !== ri))}>✕</button>}
            </div>))}
          {rows.length < (f.max || 10) && <button style={ST.add} onClick={() => save([...rows, {}])}>+ {f.addLabel || 'Add another'}</button>}
        </div>);
    },
  };
  if (done) return (
    <div style={ST.page}><div style={{ ...ST.card, textAlign: 'center' }}>
      <div style={{ fontSize: 46 }}>🎉</div>
      <h2 style={{ margin: '10px 0 8px', color: ST.navy }}>Got it — thank you!</h2>
      <p style={{ color: '#556', fontSize: 15 }}>{title === 'Business Growth Blueprint' ? "We've received your blueprint. Watch your inbox — your next step is picking a time to talk." : "Your vision is locked in. We're on it — you'll get a preview link soon."}</p>
    </div></div>);
  return (
    <div style={ST.page}>
      <div style={{ textAlign: 'center', padding: '34px 16px 10px' }}>
        <div style={{ color: accent, fontSize: 11, letterSpacing: '.25em', fontWeight: 700 }}>CONVERSION CO</div>
        <h1 style={{ color: '#fff', fontSize: 26, margin: '8px 0 4px' }}>{title}</h1>
        <p style={{ color: 'rgba(255,255,255,.65)', fontSize: 13.5 }}>{subtitle}</p>
      </div>
      <div style={{ maxWidth: 620, margin: '0 auto', padding: '0 16px 8px', display: 'flex', justifyContent: 'space-between', color: 'rgba(255,255,255,.7)', fontSize: 12.5 }}>
        <span>Step {i + 1} of {steps.length}</span><span>{Math.round(100 * (i + 1) / steps.length)}% complete</span>
      </div>
      <div style={{ maxWidth: 620, margin: '0 auto 14px', padding: '0 16px' }}>
        <div style={{ height: 5, background: 'rgba(255,255,255,.15)', borderRadius: 99 }}><div style={{ height: 5, width: `${Math.round(100 * (i + 1) / steps.length)}%`, background: accent, borderRadius: 99, transition: 'width .3s' }} /></div>
      </div>
      <div style={ST.card}>
        <div style={{ color: accent, fontSize: 11, letterSpacing: '.18em', fontWeight: 700, marginBottom: 6 }}>QUESTION {i + 1} OF {steps.length}</div>
        <h2 style={{ color: ST.navy, fontSize: 21, marginBottom: 6 }}>{s.q}</h2>
        {s.hint && <p style={{ color: '#667', fontSize: 13.5, marginBottom: 14 }}>{s.hint}</p>}
        {s.fields.map((f) => (
          <div key={f.k} style={{ marginBottom: 14 }}>
            {f.label && <label style={{ display: 'block', fontSize: 11.5, fontWeight: 700, letterSpacing: '.08em', color: '#445', marginBottom: 6 }}>{f.label.toUpperCase()}{f.req ? ' *' : ''}</label>}
            {F[f.t || 'text'](f)}
          </div>))}
        {err && <p style={{ color: '#C0392B', fontSize: 13.5, marginBottom: 10 }}>{err}</p>}
        <div style={{ display: 'flex', gap: 10 }}>
          {i > 0 && <button style={ST.back} onClick={() => { setErr(''); setI(i - 1); window.scrollTo(0, 0); }}>← Back</button>}
          <button style={{ ...ST.go, background: accent, opacity: busy ? .6 : 1 }} disabled={busy} onClick={next}>{busy ? 'Sending…' : i === steps.length - 1 ? 'Submit ✓' : 'Continue →'}</button>
        </div>
      </div>
      <p style={{ textAlign: 'center', color: 'rgba(255,255,255,.45)', fontSize: 12, padding: '14px 0 40px' }}>Your information is kept private and secure.</p>
    </div>);
}
const ST = {
  navy: '#0C1A30',
  page: { minHeight: '100vh', background: 'linear-gradient(170deg,#0C1A30,#0F2847)' },
  card: { maxWidth: 620, margin: '0 auto', background: '#fff', borderRadius: 16, padding: '26px 22px', boxShadow: '0 20px 60px rgba(0,0,0,.35)' },
  in: { width: '100%', padding: '13px 14px', border: '1.5px solid #D6DCE5', borderRadius: 10, fontSize: 16, marginBottom: 2, fontFamily: 'inherit', background: '#FAFBFC' },
  optWrap: { display: 'flex', flexDirection: 'column', gap: 8 },
  opt: { padding: '13px 14px', border: '1.5px solid #D6DCE5', borderRadius: 10, background: '#fff', fontSize: 15, textAlign: 'left' },
  chip: { padding: '11px 14px', border: '1.5px solid #D6DCE5', borderRadius: 99, background: '#fff', fontSize: 14, textAlign: 'left' },
  optOn: { borderColor: '#0D9488', background: '#F0FDFA', fontWeight: 600 },
  add: { padding: '10px 14px', border: '1.5px dashed #0D9488', borderRadius: 10, background: '#F0FDFA', color: '#0B7A6F', fontSize: 14, fontWeight: 600 },
  x: { border: 0, background: '#FEE', color: '#C0392B', borderRadius: 8, width: 38, fontSize: 15 },
  back: { flex: '0 0 auto', padding: '14px 18px', border: '1.5px solid #D6DCE5', borderRadius: 10, background: '#fff', fontSize: 15 },
  go: { flex: 1, padding: '14px 18px', border: 0, borderRadius: 10, color: '#fff', fontSize: 16, fontWeight: 700 },
};

const STEPS2 = [
  { q: "First, confirm your contact info.", fields: [
    { k: 'Email', label: 'Email', req: 1, mode: 'email', ph: 'you@example.com' },
    { k: 'Contact Number', label: 'Best number', req: 1, mode: 'tel', ph: '(918) 555-0100' },
    { k: 'Call or Text Preference', t: 'select', req: 1, opts: ['Text me', 'Call me', 'Either is fine'] }] },
  { q: "Build your drip menu.", hint: "One row per drip — name, price, and a few words on what it's for. This becomes your glowing menu, exactly as you write it.",
    fields: [{ k: 'IV Menu', t: 'rows', req: 1, addLabel: 'Add another drip', max: 10, cols: [
      { k: 'name', ph: 'Drip name (e.g. The Hydration)', flex: 2, w: 150 },
      { k: 'price', ph: 'Price', pre: '$', w: 70, mode: 'numeric' },
      { k: 'notes', ph: "What's in it / who it's for (optional)", flex: 3, w: 170 }] }] },
  { q: "Any add-ons or boosters?", hint: "Extra shots, vitamins, upgrades — optional.",
    fields: [{ k: 'Add-Ons', t: 'rows', addLabel: 'Add an add-on', max: 8, cols: [
      { k: 'name', ph: 'Add-on (e.g. Extra B12)', flex: 2, w: 150 },
      { k: 'price', ph: 'Price', pre: '$', w: 70, mode: 'numeric' }] }] },
  { q: "Which drip is your signature?", hint: "We'll spotlight it as your most-popular.",
    fields: [{ k: 'Signature Drip', ph: 'e.g. The Gold Standard' }] },
  { q: "Do you offer a membership?", fields: [
    { k: 'Membership', t: 'select', req: 1, opts: ['Yes', 'Not yet — maybe later', 'No'] },
    { k: 'Membership Details', label: 'If yes: name, monthly price, what is included', ph: 'e.g. The Glow Club — $199/mo — one drip per month + 10% off add-ons' }] },
  { q: "What feeling should your website give?", hint: "Pick every word that fits, then add your own.",
    fields: [
    { k: 'Vibe Words', t: 'chips', req: 1, opts: ['Warm & luxurious', 'Clean & clinical', 'Beachy & coastal', 'Moody & dramatic', 'Soft & feminine', 'Bold & energetic', 'Earthy & natural', 'Modern & minimal'] },
    { k: 'Vibe In Your Words', label: 'Describe it your way', ph: 'e.g. like a high-end spa that texts you back fast' }] },
  { q: "Brand colors?", fields: [
    { k: 'Brand Colors', label: 'Colors we MUST use', ph: 'e.g. teal + gold, or hex codes if you have them' },
    { k: 'Colors To Avoid', label: 'Colors you hate', ph: 'e.g. no pink, no neon' }] },
  { q: "How should clients book?", fields: [
    { k: 'Booking Method', t: 'select', req: 1, opts: ['Text me to book', 'Call me to book', 'Online booking (I have a system)'] },
    { k: 'Booking Link', label: 'Booking link (if you have one)', ph: 'paste it here' }] },
  { q: "Tell us your story.", hint: "2–4 sentences, like you're telling a friend why you started. This becomes your About page — real beats polished.",
    fields: [
    { k: 'Your Story', t: 'area', req: 1, ph: 'e.g. After 10 years in the ER, I kept seeing people who just needed hydration and care without the hospital chaos. So I brought it to their couch…' },
    { k: 'Years of Experience & Credentials', label: 'Years + credentials', req: 1, ph: 'e.g. 10 years — RN, BSN' }] },
  { q: "Real reviews from real clients?", hint: "Paste up to 3 — even texts from happy clients count. Real quotes beat anything we could write.",
    fields: [
    { k: 'Review 1', ph: '“…” — first name' },
    { k: 'Review 2', ph: '“…” — first name' },
    { k: 'Review 3', ph: '“…” — first name' }] },
  { q: "Your socials?", fields: [
    { k: 'Instagram', ph: '@handle or link' },
    { k: 'TikTok', ph: '@handle or link' },
    { k: 'Facebook', ph: 'page link' }] },
  { q: "Photos make the site feel like YOU.", hint: "Email 3–6 photos to conversionco918@gmail.com — you in scrubs, your setup, your city. Phone photos are perfect.",
    fields: [{ k: 'Photos', t: 'select', req: 1, opts: ["I'll email photos right after this", 'I already sent them', 'Use beautiful stock photos for now'] }] },
  { q: "Last one: anything we should NOT do?", fields: [
    { k: 'Do Not Include', t: 'area', ph: 'Anything you don\\'t want on the site — words, colors, claims, photos of you, etc.' },
    { k: 'Additional Notes', t: 'area', ph: 'Anything else on your mind?' }] },
];
ReactDOM.createRoot(document.getElementById('cco-form-root')).render(
  <Engine title="Website Vision" subtitle="Everything we need to build your website exactly how you imagine it"
    steps={STEPS2} accent="#C9A254" submitUrl="https://conversionco-mission-control.conversionco918.workers.dev/intake/2"
    extra={{ access_key: '65074046-434e-456a-bb54-f6ae869a0883', subject: 'Website Design Details — IV Therapy Client', from_name: 'ConversionCo Design Intake' }} />);

</script>
</body>
</html>

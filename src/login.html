<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ConversionCo — Mission Control</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, 'Segoe UI', Inter, Roboto, sans-serif; background: #071B33; min-height: 100vh; display: grid; place-items: center; }
  .card { background: #fff; border-radius: 16px; padding: 40px; width: min(400px, 90vw); box-shadow: 0 24px 60px rgba(0,0,0,.35); }
  h1 { font-size: 22px; color: #071B33; margin-bottom: 4px; }
  p.sub { color: #64748b; font-size: 14px; margin-bottom: 24px; }
  input { width: 100%; padding: 12px 14px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 15px; margin-bottom: 14px; }
  input:focus { outline: none; border-color: #071B33; }
  button { width: 100%; padding: 12px; background: #071B33; color: #fff; border: 0; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:hover { background: #0d2b4d; }
  .err { color: #dc2626; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
  <form class="card" method="POST" action="/login">
    <h1>ConversionCo</h1>
    <p class="sub">Mission Control — sign in to continue</p>
    <!--ERROR-->
    <input type="password" name="password" placeholder="Password" autofocus required>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
